[package]
name = "plotly_static"
version = "0.0.1"
description = "Export Plotly graphs to static images using WebDriver"
authors = ["Andrei Gherghescu andrei-ng@protonmail.com"]
license = "MIT"
workspace = ".."
homepage = "https://github.com/plotly/plotly.rs"
repository = "https://github.com/plotly/plotly.rs"
edition = "2021"
keywords = ["plot", "static", "image", "export", "chart", "plotly", "ndarray"]

exclude = ["target/*"]

[features]
download = []

[dependencies]
serde = { version = "1.0", features = ["derive"] }
plotly = { path = "../plotly" }
rand = "0.9"
serde_json = "1.0"
base64 = "0.22"
fantoccini = "0.21.5"
tokio = { version = "1", features = ["full"] }
askama = { version = "0.14.0", features = ["serde_json"] }
anyhow = "1.0.98"

[dev-dependencies]
plotly_static = { path = ".", features = ["download"] }
ndarray = { version = "0.16" }

[build-dependencies]
zip = "2.1"
directories = ">=4, <7"
